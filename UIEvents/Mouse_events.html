<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mouse Events Example</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            text-align: center;
            background: #414141;
            color: white;
        }

        #box{
            width:300px;
            height:200px;
            background:skyblue;
            margin:30px auto;
            display:flex;
            justify-content:center;
            align-items:center;
            font-size:22px;
            font-weight:bold;
            cursor:pointer;
            border-radius:10px;
        }

        #output{
            width:350px;
            margin:20px auto;
            background:white;
            color:black;
            padding:15px;
            border-radius:10px;
        }
    </style>
</head>
<body>

<h1>JavaScript Mouse Events</h1>

<div id="box">
    Mouse Here
</div>

<div id="output">
    Perform an action on the box.
</div>

<script>

const box = document.getElementById("box");
const output = document.getElementById("output");

// Click
box.addEventListener("click", function () {
    output.innerHTML = "<h3>Click Event</h3>You clicked the box.";
});

// Double Click
box.addEventListener("dblclick", function () {
    box.style.backgroundColor = "green";
    output.innerHTML = "<h3>Double Click</h3>Background changed to green.";
});

// Mouse Enter
box.addEventListener("mouseenter", function () {
    box.style.backgroundColor = "orange";
    output.innerHTML = "<h3>Mouse Enter</h3>Mouse entered the box.";
});

// Mouse Leave
box.addEventListener("mouseleave", function () {
    box.style.backgroundColor = "skyblue";
    output.innerHTML = "<h3>Mouse Leave</h3>Mouse left the box.";
});

// Mouse Down
box.addEventListener("mousedown", function () {
    output.innerHTML = "<h3>Mouse Down</h3>Mouse button pressed.";
});

// Mouse Up
box.addEventListener("mouseup", function () {
    output.innerHTML = "<h3>Mouse Up</h3>Mouse button released.";
});

// Mouse Move
box.addEventListener("mousemove", function (event) {
    output.innerHTML = `
        <h3>Mouse Move</h3>
        X: ${event.offsetX}<br>
        Y: ${event.offsetY}
    `;
});

// Right Click
box.addEventListener("contextmenu", function (event) {
    event.preventDefault();
    output.innerHTML = "<h3>Right Click</h3>Context menu disabled.";
});

</script>

</body>
</html>
