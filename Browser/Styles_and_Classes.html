
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Styles and Classes</title>

  <style>
    .box {
      width: 300px;
      padding: 20px;
      border: 4px solid black;
      border-radius: 12px;
      margin: 20px 0;
    }

    .highlight {
      background-color: yellow;
      color: red;
      font-weight: bold;
    }

    .dark {
      background-color: #333;
      color: white;
    }

    .rounded {
      border-radius: 10px;
    }
    
    .style {
        width: 170px;
        margin: 5px;
        background-color: green;
        color: #ffffff;
        font-size: 18px;
        padding: 10px 20px;
        border: #ffffff;
        border-radius: 8px;

    }
    .add {
        width: 170px;
        margin: 5px;
        background-color: lightblue;
        color: #ffffff;
        font-size: 18px;
        padding: 10px 20px;
        border: #ffffff;
        border-radius: 8px;
        
    }
    .remove {
        width: 170px;
        margin: 5px;
        background-color: red;
        color: #ffffff;
        font-size: 18px;
        padding: 10px 20px;
        border: #ffffff;
        border-radius: 8px;
        
    }
    .toggle {
        width: 170px;
        margin: 5px;
        background-color: gray;
        color: #ffffff;
        font-size: 18px;
        padding: 10px 20px;
        border: #ffffff;
        border-radius: 8px;
        
    }
  </style>
</head>
<body>

<h2>Styles and Classes Example</h2>

<div id="box" class="box">
  Hello JavaScript!
</div>

<button id="styleBtn">Change Style</button>
<button id="addBtn">Add Class</button>
<button id="removeBtn">Remove Class</button>
<button id="toggleBtn">Toggle Dark</button>

<script src="Styles_and_Classes.js"></script>

</body>
</html>
