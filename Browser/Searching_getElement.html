<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM - Query Selector</title>
    <style>
        .red-color {
            color: red;
        }
        .lightblue {
            color: blue;
        }
        .underline {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <nav class="block">
        <p class="paragraph">Welcome to my website</p>
    </nav>

    <div class="block">
        <h4>Hey There, My name is 
            <span class="red-color" id="username">MURSALEEN RAZZAQ</span></h4> 
        <P class="Block">Here is a code for you</P>
        <pre><code>console.log('Hey There')</code></pre>
    </div>

    <div class="block">
        <h4>Hey There, My name is 
            <span class="red-color" id="user">NADEEM RAZZAQ</span></h4> 
        <P class="Block">Here is a code for you</P>
        <pre><code>console.log('Hey There')</code></pre>
    </div>

    <script>
        const ele = document.getElementById("username");
        console.log(ele);
        ele.classList.add("red-color", "underline");
        ele.classList.remove("underline");
        ele.style.textDecoration = "underline";
        console.log(ele.parentElement);
    </script>
    <script>
        const el = document.getElementById("user");
        console.log(el);
        el.classList.add("lightblue", "underline")
        console.log(el.classList);
    </script>
</body>
</html>
