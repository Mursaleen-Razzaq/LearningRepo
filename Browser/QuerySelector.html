<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM Query Selector</title>
</head>
<body>

    <nav class="block">
        <p class="paragraph">Welcome to my website</p>
    </nav>
    <div class="block">
        <h4>Hey There, My name is <span id="username">MURSALEEN RAZZAQ</span></h4>
        <P class="paragraph">Here is a code for you</P>
        <pre><code>console.log('Hey There')</code></pre>
    </div>
    <script>
        //Query Selector
        /*
        Selectors
        --tag name
        --id #
        --class
        */
        const body = document.querySelector("body");
        console.log(body);
        // body.innerHTML = "<h1>Hacked!!</h1>";
        // console.log(body.innerHTML);
            
        const div = document.querySelector("div");
        console.log(div.innerHTML);
        // div.innerHTML = "<h1>This is Hacked!!!</h1>"


        const username = document.querySelector("#username");
        username.innerText = "NADEEM";
        

        const ele = document.querySelector(".paragraph")
        // console.log(ele);
        console.log(ele.innerHTML);
        
    </script>
</body>
</html>
