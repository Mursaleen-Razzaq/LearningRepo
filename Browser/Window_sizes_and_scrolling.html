<!DOCTYPE html>
<html>
<head>
  <title>Window & Scroll Info</title>
  
</head>
<h1>Window Size and scrolling</h1>
<body style="height: 2000px; 
font-family: sans-serif;">

 <div id="info" 
 style="position: fixed; 
 top: 10px; 
 left: 10px; 
 margin-top: 14%;
 margin-left: 14%;
 background: green; 
 color: whitesmoke;
 border: 1px solid #333; 
 border-radius: 8%; 
 padding: 20px; 
 font-size: 14px; 
 box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);"
 
 >


    <p>Window Width: <span id="width"></span></p>
    <p>Window Height: <span id="height"></span></p>
    <p>Scroll X: <span id="scrollX"></span></p>
    <p>Scroll Y: <span id="scrollY"></span></p>
    <p id="status"></p>
  </div>

  <script>
    function updateInfo() {
      document.getElementById("width").textContent = window.innerWidth;
      document.getElementById("height").textContent = window.innerHeight;
      document.getElementById("scrollX").textContent = window.scrollX;
      document.getElementById("scrollY").textContent = window.scrollY;

      let status = "";
      if (window.scrollY === 0) {
        status = "You are at the TOP.";
      }
      if (window.innerHeight + window.scrollY >= document.body.scrollHeight) {
        status = "You reached the BOTTOM.";
      }
      document.getElementById("status").textContent = status;
    }

    // Runs when the page loads
    window.addEventListener("load", function () {
      console.log("Page Loaded");
      updateInfo();
    });

    // Detect scrolling
    window.addEventListener("scroll", updateInfo);

    // Detect window resize
    window.addEventListener("resize", updateInfo);

//     alert('Current scroll from the top: ' + window.pageYOffset);
// alert('Current scroll from the left: ' + window.pageXOffset);

  </script>

</body>
</html>
