<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mouse Coordinates</title>

    <style>
        body {
            font-family: Arial, sans-serif;
        }

        #box {
            width: 350px;
            height: 200px;
            margin-left: 7%;
            border-radius: 4%;
            background-color: green;
            border: 4px solid blue;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            cursor: pointer;
        }

        #output {
            border: 1px solid gray;
            border: 4px solid blue;
            border-radius: 4%;
            margin-left: 7%;
            padding: 10px;
            width: 350px;
            background-color: #f5f5f5;
        }
    </style>
</head>
<body>

<h2>Click Inside the Box</h2>

<div id="box">
    Click Here
</div>

<div id="output">
    Click inside the box to see coordinates.
</div>

<script src="Coordinates.js"></script>

</body>
</html>
