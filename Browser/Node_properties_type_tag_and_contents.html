<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Node Properties</title>
</head>

<body>
   <style>
    .red-color {
        color: red;
    }
    .light-blue {
        color: lightblue;
    }
   </style>
    <h1>Node Properties: nodeType, tagName, innerHTML, and constructor</h1>
    <nav class="block">
        <p class="paragraph">Welcome to my website</p>
    </nav>
    <div class="block">
        <h4>
            Hey There, My name is
            <span id="username">MURSALEEN RAZZAQ</span>
        </h4>
        <p class="paragraph">Here is a code for you</p>
        <pre><code>console.log('Hey There')</code></pre>
    </div>

    <script>
        console.log("Last Child Node Type:", document.body.lastChild.nodeType);
    </script>

    <script>
        const ele = document.getElementById("username");
        console.log(ele);
        // ele.classList.add("red-color");
        ele.classList.add("light-blue");

        let body = document.body;
        console.log("Tag Name:", body.tagName);
        // body.innerHTML = "<!--" + body.tagName + "-->";
        console.log("Comment Data:", body.firstChild.data);
        console.log("Document Constructor:", document.constructor.name);
    </script>

</body>
</html>
