<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Introduction to Browser Events</title>
</head>
<body>

<h2>Introduction to Browser Events</h2>

<img id="photoshop" src="Mursaleen.jpeg" width="200">

<script>
const image = document.getElementById("photoshop");

// Method 1
image.onclick = function () {
    alert("Picture Clicked!");
};
   
   const images = document.getElementById("photoshop");

image.addEventListener("click", function () {
    alert("Image Clicked");
});

image.addEventListener("mouseenter", function () {
    image.style.border = "5px solid red";
});

// Method 2 (Recommended)
// image.addEventListener("click", function () {
//     alert("Picture Clicked!");
// });

</script>

</body>
</html>
