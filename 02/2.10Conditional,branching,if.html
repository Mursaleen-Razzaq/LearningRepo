<!DOCTYPE html>
<html>
    <h1>Conditional Statements </h1>
    <p>Conditional statements allow you to execute different blocks of code 
        based on certain conditions. <br>
        The most common conditional statement in JavaScript is the <code>if</code> statement. <br>
        It evaluates a condition and executes the block of code if the condition is true.</p>
        <script>
            let age = 18;
            if (age >= 18) {
                console.log("You are an adult.");
            } else {
                console.log("You are a minor.");
            }

                let year = 2026;
            if (year == 2025){
                console.log("It's too early");
            }else if (year == 2026){
                console.log("It's the current year");
            }else{
                console.log("It's some other year");
            }
        </script>
</html>
