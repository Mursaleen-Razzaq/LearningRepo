<!DOCTYPE html>
<html>
    <body>
        <h1>JavaScript Interaction</h1>
        <h2>Task 1: alert()</h2>

        <script>
            alert("I am an alert box!");
        </script>

        <h3>Task 2: prompt()</h2>
        <script>
        let name = prompt("Please enter your name?", "Guest");
        console.log(name);
        </script>

        <h4>Task 3: confirm()</h4>
        <script>
            let deletePost = confirm("Are you sure you want to delete this post?");
            if (deletePost) {
                console.log("Your Post has been deleted.");
            } else {
                console.log("Your Post has not been deleted.");
            }
            console.log(deletePost);
        </script>
    </body>
</html>
