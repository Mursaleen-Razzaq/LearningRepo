<!DOCTYPE html>
<html>
    <h1>Comparisons</h1>
    <p>Comparison operators are used to compare two values 
        and return a boolean result (true or false). <br>
        They are essential for making decisions in programming. 
        Here are some common comparison operators in JavaScript:</p>
        <script>
            
         let comp1 = 10;
            let comp2 = 20;
            console.log("comp1 == comp2 : " , (comp1 == comp2));
            console.log("comp1 != comp2 : " , (comp1 != comp2));
            console.log("comp1 === comp2 : " , (comp1 === comp2));
            console.log("comp1 !== comp2 : " , (comp1 !== comp2));
            console.log("comp1 > comp2 : " , (comp1 > comp2));
            console.log("comp1 < comp2 : " , (comp1 < comp2));
            console.log("comp1 >= comp2 : " , (comp1 >= comp2));
            console.log("comp1 <= comp2 : " , (comp1 <= comp2));
        </script>
</html>
