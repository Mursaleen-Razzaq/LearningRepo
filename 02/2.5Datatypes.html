<!DOCTYPE html>
<html>
    <body>
        //Numbers...
        <h1>JavaScript Data Types</h1>
        <h2>Number</h2>
        <script>
            let num1 = 10;
            let num2 = 3.14;
            console.log(num1 + num2);
            alert(num1 + num2);

            //Strings...
            const name = "Mursaleen";
            console.log(name);
            alert(name);

            //Booleans...
            const isStudent = true;
            console.log(isStudent);
            alert(isStudent);

            //Undefined...
            const x = undefined;
            console.log(x);
            alert(x);

            //Null...
            const y = null;
            console.log(y);
            alert(y);

            //Objects...
            const person = {
                firstName: "Mursaleen",
                lastName: "Razzaq",
                age: 20,
                isStudent: true,
            }
            console.log(person.firstName)
        </script>
    </body>
</html>
