<!DOCTYPE html>
<html>
        <head><meta charset="utf-8"></head><head></head><body>
        //Numbers...
        <h1>JavaScript Data Types</h1>
        <h2>Number</h2>
        <script>
            let num1 = 10;
            let num2 = 3.14;
            console.log(num1 + num2);
            alert(num1 + num2);

            //Strings...
            const name = "Mursaleen";
            console.log(name);
            alert(name);

            //Booleans...
            const isStudent = true;
            console.log(isStudent);
            alert(isStudent);

            //Undefined...
            const x = undefined;
            console.log(x);
            alert(x);

            //Null...
            const y = null;
            console.log(y);
            alert(y);

            //Objects...
            const person = {
                firstName: "Mursaleen",
                lastName: "Razzaq",
                age: 20,
                isStudent: true,
            }
            console.log(person.firstName)

            //Operators...
            let num = 10;
            let Num2 = 20;
            console.log(num + Num2);
            console.log(num - Num2);
            console.log(num * Num2);
            console.log(num / Num2);

            //Typeof operator...
            console.log(typeof person);

            // Type conversion...
              let age = "25";
              age = Number(age);
              console.log(age + 5); // 30
        </script>
    


</body></html>
