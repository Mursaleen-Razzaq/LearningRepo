<!DOCTYPE html>
<html> 
    <h1>Logical Operators</h1>
    <script>

        //Logical Operators
            let x = 5;
            let y = 7;
            console.log(x < y && x == 5);
            console.log(x < y || x == 5);
            console.log(!(x < y));
            console.log(x > y && x == 5);
            console.log(x > y || x == 5);
            console.log( false || true || x );  // true
    </script>
</html>
