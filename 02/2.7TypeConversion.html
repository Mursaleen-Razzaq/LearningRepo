<!DOCTYPE html>
<html>
    <body>
        <h1>Type Conversion</h1>
        <script>
            // String to Number
            let strNum = "123";
            let num = Number(strNum);
            console.log(typeof num); // "number"

            // Number to String
            let num2 = 456;
            let str = String(num2);
            console.log(typeof str); // "string"

            // Boolean to String
            let bool = true;
            let boolStr = String(bool);
            console.log(typeof boolStr); // "string"

            // String to Boolean
            let strBool = "false";
            let boolVal = Boolean(strBool);
            console.log(typeof boolVal); // "boolean"
        </script>
    </body>
</html>
