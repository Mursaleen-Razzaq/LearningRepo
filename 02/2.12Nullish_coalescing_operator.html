<!DOCTYPE html>
<html>
    <h1>Nullish coalescing operator '??'</h1>
</html>
    <script>
        //Nullish coalescing operator '??'
        let a = null;
        let b = undefined;
        let c = 0;
        let d = '2';
        console.log(a ?? 'default'); // 'default'
        console.log(b ?? 'default'); // 'default'
        console.log(c ?? 'default'); // 0
        console.log(d ?? 'default'); // 2
        </script>'
</html>
